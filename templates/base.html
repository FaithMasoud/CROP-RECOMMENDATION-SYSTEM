<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ================================
         META TAGS
         ================================ -->
    <meta charset="UTF-8">
    <!-- viewport makes the page work on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Dynamic page title — each page can set its own -->
    <title>{% block title %}Crop Recommendation System{% endblock %}</title>

    <!-- ================================
         CSS LINK
         url_for() generates the correct
         path to our static files
         ================================ -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- ================================
         NAVIGATION BAR
         ================================ -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- Logo/Brand -->
            <a href="/" class="nav-brand">
                🌾 CropAdvisor
            </a>
            <!-- Navigation Links -->
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/#predict">Predict</a></li>
            </ul>
        </div>
    </nav>

    <!-- ================================
         MAIN CONTENT AREA
         Each page fills this block
         with its own unique content
         ================================ -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- ================================
         FOOTER
         ================================ -->
    <footer class="footer">
        <p>🌾 CropAdvisor &copy; 2025 — Helping farmers grow smarter</p>
    </footer>

    <!-- ================================
         JAVASCRIPT LINK
         Placed at bottom so page loads
         content before running scripts
         ================================ -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
