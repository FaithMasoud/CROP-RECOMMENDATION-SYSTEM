<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CropAdvisor{% endblock %}</title>

    <!-- Google Fonts — professional typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Our main stylesheet -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- ================================
         NAVIGATION BAR
         ================================ -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-icon">🌾</span>
                <span class="brand-text">CropAdvisor</span>
            </a>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/#predict" class="nav-link">Predict</a></li>
                <li><a href="/#how-it-works" class="nav-link">How It Works</a></li>
            </ul>

            <!-- Mobile menu button -->
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                &#9776;
            </button>
        </div>

        <!-- Mobile dropdown menu -->
        <div class="mobile-menu" id="mobileMenu">
            <a href="/">Home</a>
            <a href="/#predict">Predict</a>
            <a href="/#how-it-works">How It Works</a>
        </div>
    </nav>

    <!-- ================================
         MAIN CONTENT
         ================================ -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- ================================
         FOOTER
         ================================ -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand">
                <span>🌾 CropAdvisor</span>
                <p>Helping farmers grow smarter with AI</p>
            </div>
            <div class="footer-info">
                <p>Built with Python, Flask and scikit-learn</p>
                <p>&copy; 2025 CropAdvisor. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
